<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSpace Console</title>
  <script type="text/javascript" src="openspace-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
      background: #0d0d0f;
      color: #c8c8d0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #16161c;
      border-bottom: 1px solid #2a2a38;
      flex-shrink: 0;
    }

    #toolbar span {
      font-size: 13px;
      color: #666;
      font-family: 'Segoe UI', sans-serif;
    }

    #ipaddress {
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 5px 10px;
      background: #0d0d0f;
      border: 1px solid #2a2a38;
      border-radius: 4px;
      color: #c8c8d0;
      width: 160px;
    }

    #ipaddress:focus { outline: none; border-color: #4a90d9; }

    #connectBtn {
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      padding: 5px 14px;
      background: #1e3a5f;
      border: 1px solid #2d5a8e;
      border-radius: 4px;
      color: #7eb8f7;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    #connectBtn:hover { background: #264873; }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }

    #status-dot.connected { background: #3fb950; }
    #status-dot.disconnected { background: #f85149; }

    #status-label {
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #555;
    }

    #status-label.connected { color: #3fb950; }
    #status-label.disconnected { color: #f85149; }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      scroll-behavior: smooth;
    }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #0d0d0f; }
    #output::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }

    .line { display: flex; gap: 8px; padding: 1px 0; }

    .line .prefix {
      flex-shrink: 0;
      user-select: none;
    }

    .line.input .prefix { color: #4a90d9; }
    .line.result .prefix { color: #3fb950; }
    .line.error .prefix { color: #f85149; }
    .line.info .prefix { color: #e3b341; }
    .line.system .prefix { color: #555; }

    .line .text { flex: 1; word-break: break-all; white-space: pre-wrap; }
    .line.input .text { color: #e6e6f0; }
    .line.result .text { color: #a8d9a8; }
    .line.error .text { color: #f47067; }
    .line.info .text { color: #e3b341; }
    .line.system .text { color: #555; font-style: italic; }

    #input-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 10px 16px;
      background: #16161c;
      border-top: 1px solid #2a2a38;
      flex-shrink: 0;
    }

    #prompt-label {
      color: #4a90d9;
      font-size: 13px;
      padding-right: 8px;
      user-select: none;
      flex-shrink: 0;
    }

    #cmdInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e6e6f0;
      font-family: 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      caret-color: #4a90d9;
    }

    #cmdInput::selection { background: #1e3a5f; }

    .autocomplete-box {
      position: fixed;
      background: #1c1c26;
      border: 1px solid #2a2a38;
      border-radius: 4px;
      font-size: 12px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 100;
      min-width: 260px;
    }

    .autocomplete-item {
      padding: 5px 12px;
      cursor: pointer;
      color: #9090a8;
    }

    .autocomplete-item .match { color: #7eb8f7; }
    .autocomplete-item.selected, .autocomplete-item:hover { background: #1e3a5f; color: #c8c8d0; }

    #hint {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #333;
      padding: 4px 16px;
      background: #0d0d0f;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div id="status-dot"></div>
  <span id="status-label">Disconnected</span>
  <span style="margin-left:auto;">Host:</span>
  <input id="ipaddress" type="text" value="localhost" placeholder="localhost" />
  <button id="connectBtn" onclick="connectToOpenSpace()">Connect</button>
</div>

<div id="output"></div>

<div id="input-row">
  <span id="prompt-label">openspace&gt;</span>
  <input id="cmdInput" type="text" autocomplete="off" spellcheck="false" placeholder="Type a command…" />
</div>

<div id="hint">↑↓ history &nbsp;·&nbsp; Tab autocomplete &nbsp;·&nbsp; Ctrl+L clear &nbsp;·&nbsp; Enter execute</div>

<div class="autocomplete-box" id="autocompleteBox" style="display:none;"></div>

<script>
  let openspace = null;
  let history = [];
  let historyIndex = -1;
  let acItems = [];
  let acIndex = -1;

  const BUILTINS = [
    'openspace.navigation.addGlobalRotation(x, y)',
    'openspace.navigation.addGlobalRoll(value)',
    'openspace.navigation.addLocalRotation(x, y)',
    'openspace.navigation.addLocalRoll(value)',
    'openspace.navigation.addTruckMovement(value)',
    'openspace.navigation.setFocus("NodeName")',
    'openspace.time.setPause(true)',
    'openspace.time.setPause(false)',
    'openspace.time.setDeltaTime(value)',
    'openspace.time.setTime("YYYY-MM-DD")',
    'openspace.printInfo("message")',
    'openspace.absPath("path")',
    'openspace.toggleShutdown()',
    'openspace.writeDocumentation()',
    'help',
    'clear',
    'history',
  ];

  const out = document.getElementById('output');
  const cmdInput = document.getElementById('cmdInput');
  const acBox = document.getElementById('autocompleteBox');

  function addLine(type, prefix, text) {
    const div = document.createElement('div');
    div.className = 'line ' + type;
    div.innerHTML = `<span class="prefix">${prefix}</span><span class="text">${escHtml(text)}</span>`;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function clearOutput() { out.innerHTML = ''; }

  function printHelp() {
    addLine('info', '//','Available commands:');
    addLine('system', '  ','help          — show this message');
    addLine('system', '  ','clear         — clear the console');
    addLine('system', '  ','history       — list command history');
    addLine('info',   '//','OpenSpace API — call any openspace.* method:');
    addLine('system', '  ','openspace.navigation.addGlobalRotation(dx, dy)');
    addLine('system', '  ','openspace.navigation.addGlobalRoll(v)');
    addLine('system', '  ','openspace.navigation.addLocalRotation(dx, dy)');
    addLine('system', '  ','openspace.navigation.addLocalRoll(v)');
    addLine('system', '  ','openspace.navigation.addTruckMovement(v)');
    addLine('system', '  ','openspace.time.setPause(bool)');
    addLine('system', '  ','openspace.time.setDeltaTime(v)');
    addLine('info', '//','Tab-complete any openspace.* command. ↑↓ for history.');
  }

  function executeCommand(raw) {
    const cmd = raw.trim();
    if (!cmd) return;

    history.unshift(cmd);
    if (history.length > 200) history.pop();
    historyIndex = -1;

    addLine('input', '>', cmd);

    if (cmd === 'clear') { clearOutput(); return; }
    if (cmd === 'help') { printHelp(); return; }
    if (cmd === 'history') {
      history.forEach((h, i) => addLine('system', (i+1)+')', h));
      return;
    }

    if (!openspace) {
      addLine('error', '✗', 'Not connected to OpenSpace. Click Connect first.');
      return;
    }

    try {
      const result = new Function('openspace', '"use strict"; return ' + cmd)(openspace);
      if (result !== undefined) {
        if (result && typeof result.then === 'function') {
          result.then(v => {
            if (v !== undefined) addLine('result', '←', JSON.stringify(v, null, 2));
          }).catch(e => addLine('error', '✗', String(e)));
        } else {
          addLine('result', '←', JSON.stringify(result, null, 2));
        }
      } else {
        addLine('result', '✓', 'OK');
      }
    } catch (e) {
      addLine('error', '✗', e.message || String(e));
    }
  }

  function updateAutocomplete() {
    const val = cmdInput.value;
    if (!val || val.length < 3) { hideAC(); return; }

    const lower = val.toLowerCase();
    acItems = BUILTINS.filter(b => b.toLowerCase().includes(lower) && b !== val);

    if (!acItems.length) { hideAC(); return; }

    acIndex = -1;
    acBox.innerHTML = '';
    acItems.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'autocomplete-item';
      const idx = item.toLowerCase().indexOf(lower);
      div.innerHTML = escHtml(item.slice(0, idx))
        + '<span class="match">' + escHtml(item.slice(idx, idx + val.length)) + '</span>'
        + escHtml(item.slice(idx + val.length));
      div.addEventListener('mousedown', e => { e.preventDefault(); applyAC(i); });
      acBox.appendChild(div);
    });

    const rect = cmdInput.getBoundingClientRect();
    acBox.style.left = rect.left + 'px';
    acBox.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    acBox.style.display = 'block';
  }

  function hideAC() { acBox.style.display = 'none'; acItems = []; acIndex = -1; }

  function applyAC(i) {
    if (i >= 0 && i < acItems.length) {
      cmdInput.value = acItems[i];
      const paren = cmdInput.value.indexOf('(');
      if (paren > -1) {
        cmdInput.setSelectionRange(paren + 1, cmdInput.value.length - 1);
      }
    }
    hideAC();
    cmdInput.focus();
  }

  cmdInput.addEventListener('keydown', e => {
    if (acBox.style.display !== 'none') {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acIndex = Math.min(acIndex + 1, acItems.length - 1);
        [...acBox.children].forEach((c, i) => c.classList.toggle('selected', i === acIndex));
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        acIndex = Math.max(acIndex - 1, -1);
        [...acBox.children].forEach((c, i) => c.classList.toggle('selected', i === acIndex));
        return;
      }
      if (e.key === 'Tab' || e.key === 'Enter') {
        e.preventDefault();
        applyAC(acIndex >= 0 ? acIndex : 0);
        if (e.key === 'Enter' && acIndex < 0) executeCommand(cmdInput.value);
        return;
      }
      if (e.key === 'Escape') { hideAC(); return; }
    }

    if (e.key === 'Enter') {
      e.preventDefault();
      executeCommand(cmdInput.value);
      cmdInput.value = '';
      hideAC();
      return;
    }

    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length) {
        historyIndex = Math.min(historyIndex + 1, history.length - 1);
        cmdInput.value = history[historyIndex];
      }
      return;
    }

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      historyIndex = Math.max(historyIndex - 1, -1);
      cmdInput.value = historyIndex >= 0 ? history[historyIndex] : '';
      return;
    }

    if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); clearOutput(); return; }
  });

  cmdInput.addEventListener('input', updateAutocomplete);

  document.addEventListener('click', e => {
    if (!acBox.contains(e.target) && e.target !== cmdInput) hideAC();
  });

  function setStatus(state, label) {
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    dot.className = state;
    lbl.className = state;
    lbl.textContent = label;
  }

  function connectToOpenSpace() {
    const host = document.getElementById('ipaddress').value || 'localhost';
    addLine('system', '~', 'Connecting to ' + host + ':4682…');
    const api = window.openspaceApi(host, 4682);

    api.onDisconnect(() => {
      setStatus('disconnected', 'Disconnected');
      addLine('error', '✗', 'Disconnected from OpenSpace.');
      openspace = null;
    });

    api.onConnect(async () => {
      try {
        openspace = await api.library();
        setStatus('connected', 'Connected to ' + host);
        addLine('result', '✓', 'Connected to OpenSpace at ' + host + '. Type "help" for available commands.');
      } catch (e) {
        addLine('error', '✗', 'Library load failed: ' + e);
      }
    });

    api.connect();
  }

  addLine('system', '~', 'OpenSpace Console — type "help" for commands, or connect to OpenSpace to begin.');
  document.addEventListener('DOMContentLoaded', () => cmdInput.focus());
  cmdInput.focus();
</script>
</body>
</html>
